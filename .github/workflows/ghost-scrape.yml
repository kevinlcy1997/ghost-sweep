name: Ghost Sweep Data Collection

on:
  schedule:
    - cron: '0 */2 * * *'  # Fallback: every 2 hours (GitHub throttles more frequent cron)
  workflow_dispatch:        # Manual trigger + self-trigger
  repository_dispatch:
    types: [ghost-poll]     # Trigger via API

concurrency:
  group: ghost-scrape
  cancel-in-progress: false  # Don't cancel running scrapes

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install cryptography requests

      - name: Run one poll cycle
        run: python ghost_listener.py --once -o ghost_alerts.json

      - name: Generate dashboard
        run: python generate_dashboard.py ghost_alerts.json docs

      - name: Commit data
        run: |
          git config user.name "ghost-bot"
          git config user.email "ghost-bot@users.noreply.github.com"
          git add ghost_alerts.json docs/index.html
          git diff --staged --quiet || git commit -m "data: poll $(date -u +%Y-%m-%dT%H:%M:%SZ) — $(python -c "import json; d=json.load(open('ghost_alerts.json')); print(d['meta']['total_alerts'])" 2>/dev/null || echo '?') alerts"
          git push

      - name: Schedule next run in 5 minutes
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GHOST_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "No GHOST_PAT secret set — relying on cron schedule"
            exit 0
          fi
          echo "Waiting 5 minutes before triggering next run..."
          sleep 300
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/ghost-scrape.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "Next run triggered"
